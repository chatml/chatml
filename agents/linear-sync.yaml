id: linear-sync
name: Linear Sync
type: monitor
description: Monitors Linear issues and syncs with development sessions

execution:
  mode: read-only
  workingDirectory: root

polling:
  interval: 120s
  sources:
    - type: linear
      resources: [issues]
      filters:
        state: in_progress
        assignee: me

capabilities:
  - read:linear

systemPrompt: |
  You monitor Linear for issues assigned to the current user.
  Track issue status and provide updates in the agent log.

  For each in-progress issue:
  1. Check if there's an associated session
  2. If yes, verify the session status matches Linear
  3. Report any discrepancies

limits:
  budgetPerRun: 0.25
  maxSessionsPerHour: 0
