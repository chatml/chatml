name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_INCREMENTAL: 0
  GO_VERSION: "1.22"
  NODE_VERSION: "lts/*"

jobs:
  # Detect which parts of the codebase changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'src/**'
              - 'package.json'
              - 'package-lock.json'
              - 'tsconfig.json'
              - 'vite.config.ts'
              - '.github/workflows/ci.yml'
            tauri:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'

  # Frontend checks (lint + build)
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  # Go backend checks (test + build)
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('backend/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Test
        working-directory: backend
        run: go test -race ./...

      - name: Build
        working-directory: backend
        run: go build -o ../src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu .

  # Rust/Tauri checks (fmt + clippy + check)
  tauri:
    name: Tauri (${{ matrix.check }})
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push'
    strategy:
      fail-fast: false
      matrix:
        check: [fmt, clippy, build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Create placeholder binaries for clippy/build checks (not needed for fmt)
      - name: Create placeholder external binaries
        if: matrix.check != 'fmt'
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu
          touch src-tauri/binaries/chatml-speech-x86_64-unknown-linux-gnu

      # Format check (fastest)
      - name: Check formatting
        if: matrix.check == 'fmt'
        working-directory: src-tauri
        run: cargo fmt --check

      # Clippy lint check
      - name: Run clippy
        if: matrix.check == 'clippy'
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

      # Build check (most comprehensive)
      - name: Build check
        if: matrix.check == 'build'
        working-directory: src-tauri
        run: cargo check
