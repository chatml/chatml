name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_INCREMENTAL: 0
  GO_VERSION: "1.25.7"
  NODE_VERSION: "lts/*"

jobs:
  # Detect which parts of the codebase changed
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      agent-runner: ${{ steps.filter.outputs.agent-runner }}
      tauri: ${{ steps.filter.outputs.tauri }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci.yml'
            frontend:
              - 'src/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'tsconfig.json'
              - 'vitest.config.ts'
              - 'vitest.setup.ts'
              - '.github/workflows/ci.yml'
            agent-runner:
              - 'agent-runner/**'
              - '.github/workflows/ci.yml'
            tauri:
              - 'src-tauri/**'
              - '.github/workflows/ci.yml'

  # Frontend checks (lint + build)
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & Test
        run: |
          pnpm run lint > lint.log 2>&1 &
          LINT_PID=$!
          pnpm run test:coverage
          wait $LINT_PID || (cat lint.log && exit 1)

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: coverage/
          retention-days: 14

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('pnpm-lock.yaml', 'next.config.ts', 'tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        run: pnpm run build

  # Agent runner checks (TypeScript build)
  agent-runner:
    name: Agent Runner
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.agent-runner == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: agent-runner/package-lock.json

      - name: Install dependencies
        working-directory: agent-runner
        run: npm install

      - name: Build
        working-directory: agent-runner
        run: npm run build

  # Go backend checks (test + build)
  backend:
    name: Backend
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: backend/go.sum

      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: ~/.cache/go-build
          key: ${{ runner.os }}-go-build-${{ hashFiles('backend/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-build-

      - name: Download dependencies
        working-directory: backend
        run: go mod download

      - name: Test with coverage
        working-directory: backend
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out | tail -1

      - name: Build
        working-directory: backend
        env:
          LINEAR_CLIENT_ID: ${{ secrets.OAUTH_LINEAR_CLIENT_ID }}
        run: |
          LDFLAGS=""
          if [ -n "$LINEAR_CLIENT_ID" ]; then
            LDFLAGS="-X 'github.com/chatml/chatml-backend/server.linearClientID=$LINEAR_CLIENT_ID'"
          fi
          go build -ldflags "$LDFLAGS" -o ../src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu .

  # Rust/Tauri format check (fast, no dependencies needed)
  tauri-fmt:
    name: Tauri Format
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

  # Rust/Tauri lint check (clippy includes type checking, no need for separate build)
  tauri-lint:
    name: Tauri Lint
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Create placeholder external binaries and resources
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu
          mkdir -p agent-runner/dist agent-runner/node_modules
          touch agent-runner/package.json

      - name: Run clippy
        working-directory: src-tauri
        run: cargo clippy -- -D warnings

  # Rust/Tauri unit tests
  tauri-test:
    name: Tauri Test
    runs-on: ubuntu-22.04
    needs: changes
    if: needs.changes.outputs.tauri == 'true' || github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Create placeholder external binaries and resources
        run: |
          mkdir -p src-tauri/binaries
          touch src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu
          mkdir -p agent-runner/dist agent-runner/node_modules
          touch agent-runner/package.json

      - name: Run tests
        working-directory: src-tauri
        run: cargo test
