name: Auto-label Issues

on:
  issues:
    types: [opened, edited]

jobs:
  auto-label:
    name: Add labels based on issue form
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Parse and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const labelsToAdd = [];

            // Parse Area from issue form
            const areaMatch = body.match(/### Area\s*\n\s*(\S[^\n]*)/);
            if (areaMatch) {
              const area = areaMatch[1].trim();
              const areaLabels = {
                'Frontend/UI': 'frontend',
                'Backend/API': 'backend',
                'Agent/Claude SDK': 'agent',
                'Infrastructure': 'infra',
                'Documentation': 'documentation',
                'Testing': 'frontend'
              };
              if (areaLabels[area]) {
                labelsToAdd.push(areaLabels[area]);
              }
            }

            // Parse Priority from issue form
            const priorityMatch = body.match(/### Priority\s*\n\s*(\S[^\n]*)/);
            if (priorityMatch) {
              const priority = priorityMatch[1].trim().toLowerCase();
              if (priority.includes('high')) {
                labelsToAdd.push('priority:high');
              } else if (priority.includes('medium')) {
                labelsToAdd.push('priority:medium');
              } else if (priority.includes('low')) {
                labelsToAdd.push('priority:low');
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: labelsToAdd
              });
              console.log(`Added labels: ${labelsToAdd.join(', ')}`);
            }
