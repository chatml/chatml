name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `ChatML v${{ steps.get-version.outputs.version }}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false
            })
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          # TODO: Re-enable for future releases
          # - platform: ubuntu-22.04
          #   args: --target x86_64-unknown-linux-gnu
          #   target: x86_64-unknown-linux-gnu
          # - platform: windows-latest
          #   args: --target x86_64-pc-windows-msvc
          #   target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          cache-on-failure: true

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache-dependency-path: backend/go.sum

      - name: Build Go backend (macOS ARM64)
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          LINEAR_CLIENT_ID: ${{ secrets.OAUTH_LINEAR_CLIENT_ID }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          if [ -n "$LINEAR_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.linearClientID=$LINEAR_CLIENT_ID'"
          fi
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-aarch64-apple-darwin .

      - name: Build Go backend (macOS x64)
        if: matrix.target == 'x86_64-apple-darwin'
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          LINEAR_CLIENT_ID: ${{ secrets.OAUTH_LINEAR_CLIENT_ID }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          if [ -n "$LINEAR_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.linearClientID=$LINEAR_CLIENT_ID'"
          fi
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-x86_64-apple-darwin .

      - name: Build Go backend (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          LINEAR_CLIENT_ID: ${{ secrets.OAUTH_LINEAR_CLIENT_ID }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          if [ -n "$LINEAR_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.linearClientID=$LINEAR_CLIENT_ID'"
          fi
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu .

      - name: Build Go backend (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          LINEAR_CLIENT_ID: ${{ secrets.OAUTH_LINEAR_CLIENT_ID }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          if [ -n "$LINEAR_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.linearClientID=$LINEAR_CLIENT_ID'"
          fi
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-x86_64-pc-windows-msvc.exe .

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build agent-runner
        run: cd agent-runner && npm ci && npm run build && npm prune --production

      - name: Import Apple certificate (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12
          security create-keychain -p "actions" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "actions" "$KEYCHAIN_PATH"
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "actions" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

      - name: Sign native binaries in agent-runner (macOS)
        if: runner.os == 'macOS'
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          # Find all Mach-O binaries (executables, dylibs, .node files) in agent-runner/node_modules
          # and codesign them so Apple notarization doesn't reject the bundle.
          find agent-runner/node_modules -type f \( -name "*.node" -o -name "*.dylib" -o -perm +111 \) | while read -r file; do
            if file "$file" | grep -q "Mach-O"; then
              echo "Signing: $file"
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$file"
            fi
          done

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub OAuth (embedded in frontend at build time)
          NEXT_PUBLIC_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          # Linear OAuth (embedded in frontend at build time)
          NEXT_PUBLIC_LINEAR_CLIENT_ID: ${{ secrets.OAUTH_LINEAR_CLIENT_ID }}
          # Tauri update signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tauriScript: npx tauri
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
