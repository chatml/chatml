name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.1.0)'
        required: true

env:
  CARGO_INCREMENTAL: 0

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release_id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: get-version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `ChatML v${{ steps.get-version.outputs.version }}`,
              body: 'See the assets to download and install this version.',
              draft: true,
              prerelease: false
            })
            return data.id

  build-tauri:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            target: aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: --target x86_64-unknown-linux-gnu
            target: x86_64-unknown-linux-gnu
          - platform: windows-latest
            args: --target x86_64-pc-windows-msvc
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.7'
          cache-dependency-path: backend/go.sum

      - name: Build Go backend (macOS ARM64)
        if: matrix.target == 'aarch64-apple-darwin'
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-aarch64-apple-darwin .

      - name: Build Go backend (macOS x64)
        if: matrix.target == 'x86_64-apple-darwin'
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-x86_64-apple-darwin .

      - name: Build Go backend (Linux x64)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-x86_64-unknown-linux-gnu .

      - name: Build Go backend (Windows x64)
        if: matrix.target == 'x86_64-pc-windows-msvc'
        shell: bash
        env:
          GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          GITHUB_CLIENT_SECRET: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
          BUILD_VERSION: ${{ needs.create-release.outputs.version }}
        run: |
          cd backend
          LDFLAGS="-X 'github.com/chatml/chatml-backend/server.buildVersion=$BUILD_VERSION'"
          if [ -n "$GITHUB_CLIENT_ID" ]; then
            LDFLAGS="$LDFLAGS -X 'github.com/chatml/chatml-backend/server.githubClientID=$GITHUB_CLIENT_ID' \
              -X 'github.com/chatml/chatml-backend/server.githubClientSecret=$GITHUB_CLIENT_SECRET'"
          fi
          GOOS=windows GOARCH=amd64 go build -ldflags "$LDFLAGS" \
            -o ../src-tauri/binaries/chatml-backend-x86_64-pc-windows-msvc.exe .

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GitHub OAuth (embedded in frontend at build time)
          NEXT_PUBLIC_GITHUB_CLIENT_ID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
          # Tauri update signing
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Apple code signing + notarization
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          args: ${{ matrix.args }}

  publish-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    needs: [create-release, build-tauri]

    steps:
      - name: Publish release
        id: publish-release
        uses: actions/github-script@v7
        env:
          release_id: ${{ needs.create-release.outputs.release_id }}
        with:
          script: |
            github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: process.env.release_id,
              draft: false,
              prerelease: false
            })
