name: Project Automation

on:
  issues:
    types: [closed, reopened]
  pull_request:
    types: [closed, reopened]

env:
  PROJECT_NUMBER: 1
  ORG: chatml

jobs:
  update-status:
    name: Update project status
    runs-on: ubuntu-latest
    steps:
      - name: Move to Done when closed
        if: github.event.action == 'closed'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemType = context.payload.issue ? 'Issue' : 'PullRequest';
            const itemNumber = context.payload.issue?.number || context.payload.pull_request?.number;

            // Get the project
            const project = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `, {
              org: process.env.ORG,
              number: parseInt(process.env.PROJECT_NUMBER)
            });

            const projectId = project.organization.projectV2.id;
            const statusField = project.organization.projectV2.field;
            const doneOption = statusField.options.find(o => o.name === 'Done');

            if (!doneOption) {
              console.log('Done status not found');
              return;
            }

            // Find the item in the project
            const items = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                          }
                          ... on PullRequest {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              org: process.env.ORG,
              number: parseInt(process.env.PROJECT_NUMBER)
            });

            const item = items.organization.projectV2.items.nodes.find(
              i => i.content?.number === itemNumber
            );

            if (!item) {
              console.log('Item not found in project');
              return;
            }

            // Update the status
            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `, {
              projectId: projectId,
              itemId: item.id,
              fieldId: statusField.id,
              optionId: doneOption.id
            });

            console.log(`Moved item to Done`);

      - name: Move to In Progress when reopened
        if: github.event.action == 'reopened'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const itemNumber = context.payload.issue?.number || context.payload.pull_request?.number;

            const project = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            `, {
              org: process.env.ORG,
              number: parseInt(process.env.PROJECT_NUMBER)
            });

            const projectId = project.organization.projectV2.id;
            const statusField = project.organization.projectV2.field;
            const inProgressOption = statusField.options.find(o => o.name === 'In Progress');

            if (!inProgressOption) {
              console.log('In Progress status not found');
              return;
            }

            const items = await github.graphql(`
              query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    items(first: 100) {
                      nodes {
                        id
                        content {
                          ... on Issue {
                            number
                          }
                          ... on PullRequest {
                            number
                          }
                        }
                      }
                    }
                  }
                }
              }
            `, {
              org: process.env.ORG,
              number: parseInt(process.env.PROJECT_NUMBER)
            });

            const item = items.organization.projectV2.items.nodes.find(
              i => i.content?.number === itemNumber
            );

            if (!item) {
              console.log('Item not found in project');
              return;
            }

            await github.graphql(`
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }
            `, {
              projectId: projectId,
              itemId: item.id,
              fieldId: statusField.id,
              optionId: inProgressOption.id
            });

            console.log(`Moved item to In Progress`);
